<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Resenhe-se - Resenhas de Livros</title>
</head>
<body>

    <header class="bg-dark text-white py-3">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <h1 class="h3 mb-0">Resenhe-se</h1>
                <nav>
                    <a href="index.html" class="text-white text-decoration-none me-3">Home</a>
                    <a href="#" class="text-white text-decoration-none me-3">Livros</a>
                    <a href="#" class="text-white text-decoration-none me-3">Personagens</a>
                    <a href="#" class="text-white text-decoration-none">Contato</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="container my-5">
            <h2 class="text-center mb-4">Livros em Destaque</h2>
            <div id="carrosselDestaques" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner" id="slider-destaques"></div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carrosselDestaques" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark rounded-circle p-3"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carrosselDestaques" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark rounded-circle p-3"></span>
                </button>
            </div>
        </section>

        <section class="container my-5">
            <h2 class="text-center mb-4">📚 Todos os Livros</h2>
            <div class="row" id="lista-livros"></div>
        </section>

        <section class="sobre-autor">
            <div class="container">
                <h2>👨‍🎓 Sobre o Autor</h2>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card-autor text-center p-4">
                            <h3>Luiz Andrade</h3>
                            <p class="text-muted">Curso: Sistemas de Informação</p>
                            <p class="text-muted">Turma: Noite</p>
                            <p>Email: luiz.gandrade9@gmail.com</p>
                            <div class="social-links mt-3">
                                <strong>Redes Sociais:</strong><br>
                                <a href="#">📷 Instagram</a> |
                                <a href="#">🐙 GitHub</a> |
                                <a href="#">🔗 LinkedIn</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-0">© 2026 - Resenhe-se - Todos os direitos reservados</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
